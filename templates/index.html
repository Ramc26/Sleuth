<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleuth | FinTech Investigator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4 py-3">
    <div class="container-fluid px-4">
        <span class="navbar-brand mb-0 h4 fw-bold">🕵️‍♂️ Sleuth</span>
        <button id="indexDbBtn" class="btn btn-primary btn-sm rounded-pill px-3">🔄 Sync Evidence Locker</button>
    </div>
</nav>

<div class="container-fluid px-4">
    <div class="row mb-4 align-items-center">
        <div class="col-md-5">
            <div class="card h-100">
                <div class="card-body">
                    <form id="uploadForm" class="row g-3 align-items-center">
                        <div class="col-md-5">
                            <label class="form-label small text-muted">System A (Vendor)</label>
                            <input class="form-control form-control-sm" type="file" id="fileA" accept=".csv" required>
                        </div>
                        <div class="col-md-5">
                            <label class="form-label small text-muted">System B (ERP)</label>
                            <input class="form-control form-control-sm" type="file" id="fileB" accept=".csv" required>
                        </div>
                        <div class="col-md-2 mt-4 pt-2">
                            <button type="submit" class="btn btn-dark btn-sm w-100">Reconcile</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        
        <div class="col-md-7">
            <div class="row g-3">
                <div class="col-md-4">
                    <div class="card bg-primary text-white h-100">
                        <div class="card-body">
                            <h6 class="card-title opacity-75">Total Transactions</h6>
                            <h2 id="metricTotal" class="mb-0 fw-bold">-</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card bg-danger text-white h-100">
                        <div class="card-body">
                            <h6 class="card-title opacity-75">Flagged Issues</h6>
                            <h2 id="metricFlagged" class="mb-0 fw-bold">-</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card bg-dark text-white h-100">
                        <div class="card-body">
                            <h6 class="card-title opacity-75">Variance at Risk</h6>
                            <h2 id="metricRisk" class="mb-0 fw-bold">$-</h2>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-5">
            <div class="card h-100">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0 text-primary fw-bold">Investigation Board</h5>
                </div>
                <div class="card-body p-0 table-responsive" style="max-height: 600px;">
                    <table class="table table-hover align-middle mb-0" id="discrepancyTable">
                        <thead class="table-light sticky-top">
                            <tr>
                                <th>Invoice</th>
                                <th>Entity</th>
                                <th>Variance</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td colspan="4" class="text-center py-5 text-muted">Upload ledgers to begin reconciliation.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card h-100 border-0 shadow-lg">
                <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
                    <h5 class="mb-0 fw-bold">Forensic Report</h5>
                    <span id="investigationStatus" class="badge rounded-pill bg-secondary px-3 py-2">Awaiting Selection</span>
                </div>
                <div class="card-body p-4 overflow-auto" id="reportContainer" style="max-height: 600px; background-color: #fff;">
                    <div class="text-center py-5 text-muted">
                        <h1 class="display-1 opacity-25">🕵️‍♂️</h1>
                        <p class="mt-3">Select a flagged transaction from the board to initiate an AI investigation.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
